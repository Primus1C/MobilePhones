<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"></meta><title>Дашборд 5 индикаторов</title><style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            /* Чтобы при сжатии окна индикаторы не сплющивались, а появлялась прокрутка */
            overflow-x: auto; 
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        /* Контейнер для горизонтального расположения 5 графиков */
        .dashboard-container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
            min-width: 1000px; /* Защита от сильного сжатия */
        }

        .gauge-card {
            background: #ffffff;
            padding: 20px 10px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            flex: 1; /* Все карточки занимают равную ширину */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVG элементы */
        .svg-container {
            width: 100%;
            max-width: 250px; /* Ограничиваем максимальный размер */
        }
        svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }
        
        /* Вращение для выреза в левой верхней четверти */
        .rings-group {
            transform: rotate(-90deg);
            transform-origin: 150px 150px; 
        }
        
        .track-bg {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }
        .track-data {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            /* Анимация заполнения */
            transition: stroke-dasharray 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        /* Стили шрифтов */
        .ring-label { font-size: 11px; font-weight: 600; }
        .ring-val { font-size: 11px; font-weight: normal; opacity: 0.8; }
        
        .center-value { font-size: 32px; font-weight: bold; }
        .center-text { font-size: 12px; font-weight: 500; }
    </style></head><body>

<div class="dashboard-container">
    <div class="gauge-card"><div class="svg-container" id="gauge-1"></div></div>
    <div class="gauge-card"><div class="svg-container" id="gauge-2"></div></div>
    <div class="gauge-card"><div class="svg-container" id="gauge-3"></div></div>
    <div class="gauge-card"><div class="svg-container" id="gauge-4"></div></div>
    <div class="gauge-card"><div class="svg-container" id="gauge-5"></div></div>
</div>

<script>
    // Настройки геометрии 
    const size = 300;
    const center = 150;
    const baseRadius = 125; 
    const trackWidth = 12;
    const trackGap = 6;
    const maxScale = 100; // Для расчета процентов (если значение > 100, линия просто заполнит 270°)

    // Жестко привязанные цвета для 4х возможных показателей
    const ringColors = [
        { color: '#e53e3e', bgColor: '#fed7d7' }, // 1: Красный
        { color: '#38a169', bgColor: '#c6f6d5' }, // 2: Зеленый
        { color: '#3182ce', bgColor: '#bee3f8' }, // 3: Синий
        { color: '#d69e2e', bgColor: '#fef08a' }  // 4: Желтый
    ];

    /**
     * ГЛАВНАЯ ФУНКЦИЯ ДЛЯ ВЫЗОВА ИЗ 1С
     * Принимает номер индикатора (1-5) и 12 параметров для него.
     */
    window.UpdateIndicator = function(
        indicatorIndex, 
        n1, v1, n2, v2, n3, v3, n4, v4, 
        tName, tVal, tNameColor, tValColor
    ) {
        // 1. Формируем массив только из ЗАДАННЫХ показателей
        // Если из 1С пришла пустая строка, Null или Undefined, показатель не добавится
        let items = [];
        if (n1 && v1 !== undefined && v1 !== null && v1 !== "") items.push({ name: n1, val: Number(v1), ...ringColors[0] });
        if (n2 && v2 !== undefined && v2 !== null && v2 !== "") items.push({ name: n2, val: Number(v2), ...ringColors[1] });
        if (n3 && v3 !== undefined && v3 !== null && v3 !== "") items.push({ name: n3, val: Number(v3), ...ringColors[2] });
        if (n4 && v4 !== undefined && v4 !== null && v4 !== "") items.push({ name: n4, val: Number(v4), ...ringColors[3] });

        // 2. Дефолтные цвета для центра, если не передали
        const centerNameColor = tNameColor || '#a0aec0';
        const centerValColor = tValColor || '#2d3748';
        const centerName = tName || '';
        const centerVal = (tVal !== undefined && tVal !== null) ? tVal : '';

        // 3. Генерируем SVG
        let svgHTML = `<svg viewBox="0 0 ${size} ${size}">`;
        let ringsHTML = `<g class="rings-group">`;
        let labelsHTML = `<g class="labels-group">`;

        items.forEach((item, i) => {
            // Радиус схлопывается динамически: если показателей 2, они займут 2 внешних кольца
            const r = baseRadius - (i * (trackWidth + trackGap));
            const circ = 2 * Math.PI * r;
            
            // Вырез 25% (оставляем 270 градусов)
            const trackLength = circ * 0.75;
            const gapLength = circ * 0.25;

            // Расчет целевой длины анимации
            const safeVal = Math.min(item.val, maxScale);
            const targetDash = (safeVal / maxScale) * trackLength;

            // Фон
            ringsHTML += `<circle class="track-bg" cx="${center}" cy="${center}" r="${r}" 
                                  stroke="${item.bgColor}" 
                                  stroke-dasharray="${trackLength} ${gapLength}" />`;

            // Данные (Изначально ставим 0, а целевое значение прячем в data-атрибут для анимации)
            ringsHTML += `<circle class="track-data" cx="${center}" cy="${center}" r="${r}" 
                                  stroke="${item.color}" 
                                  stroke-dasharray="0 ${circ}" 
                                  data-target="${targetDash}" 
                                  data-circ="${circ}" />`;

            // Подписи (выравниваем в левой верхней пустоте)
            const textY = center - r + 4;
            labelsHTML += `
                <text x="${center - 10}" y="${textY}" text-anchor="end" class="ring-label" fill="${item.color}">
                    ${item.name} <tspan class="ring-val">${item.val}</tspan>
                </text>
            `;
        });

        ringsHTML += `</g>`;
        labelsHTML += `</g>`;

        // Центральные надписи
        let centerHTML = `
            <text x="${center}" y="${center + 5}" text-anchor="middle" class="center-value" fill="${centerValColor}">${centerVal}</text>
            <text x="${center}" y="${center + 25}" text-anchor="middle" class="center-text" fill="${centerNameColor}">${centerName}</text>
        `;

        svgHTML += ringsHTML + labelsHTML + centerHTML + `</svg>`;

        // 4. Вставляем HTML в нужный контейнер
        const</script></body></html>
